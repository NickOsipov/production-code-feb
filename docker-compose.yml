# flask app docker-compose.yml
services:
  mysql-db:
    image: mysql:5.7
    container_name: mysql-db
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

  prod-code:
    env_file:
      - .env
    environment:
      - MODE_ENV=prod
    ports:
      - "5000:5000"
    container_name: prod-code
    image: nickosipov/prod-code:latest


volumes:
  mysql-data:

networks:
  default:
    name: prod-code-network
