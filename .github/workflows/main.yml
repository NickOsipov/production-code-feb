name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: nickosipov/prod-code

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Push Docker image
  # ─────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 2: Deploy to server
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build   # запускается только после успешного build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/production-code-feb
            git pull origin main
            docker compose pull
            docker compose down
            docker compose up prod-code --force-recreate -d
